<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wijntripje.nl — NL Wijn Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0a07; color: #f0e6d3; font-family: Georgia, serif; min-height: 100vh; padding-bottom: 60px; }
  header { background: linear-gradient(180deg, #1a0a0f 0%, #2d1020 100%); border-bottom: 1px solid #5c2a3a; padding: 18px 20px; display: flex; align-items: center; gap: 12px; }
  header .icon { font-size: 28px; }
  header .title { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
  header .sub { font-size: 11px; color: #c4a882; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  main { max-width: 480px; margin: 0 auto; padding: 24px 16px 0; }
  .label { font-size: 12px; color: #c4a882; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .search-row { display: flex; gap: 8px; margin-bottom: 20px; }
  input[type=text] { flex: 1; background: #1a1008; border: 1px solid #5c3a20; border-radius: 10px; padding: 13px 16px; font-size: 16px; color: #f0e6d3; outline: none; font-family: Georgia, serif; }
  input[type=text]::placeholder { color: #5c3a20; }
  button#searchBtn { background: #7B1E3A; border: none; border-radius: 10px; padding: 13px 20px; color: #f0e6d3; font-size: 20px; cursor: pointer; min-width: 54px; }
  button#searchBtn:disabled { background: #3d1a0a; cursor: default; }
  #loading { display: none; text-align: center; padding: 40px 0; color: #c4a882; }
  #loading .spin { font-size: 36px; margin-bottom: 10px; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #result { display: none; background: #1a1008; border: 1px solid #3d2010; border-radius: 14px; padding: 18px; margin-bottom: 20px; }
  .winery-name { font-size: 18px; font-weight: bold; line-height: 1.3; margin-bottom: 4px; }
  .winery-sub { font-size: 13px; color: #c4a882; margin-bottom: 14px; }
  .badge { border-radius: 8px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .badge .badge-icon { font-size: 24px; flex-shrink: 0; }
  .badge .badge-label { font-weight: bold; font-size: 16px; }
  .badge .badge-conf { font-size: 12px; margin-top: 2px; }
  .badge-yes { background: #1a4731; border: 1px solid #2d7a4f; }
  .badge-yes .badge-label { color: #4ade80; }
  .badge-yes .badge-conf { color: #86efac; }
  .badge-no { background: #3d1a1a; border: 1px solid #7a2d2d; }
  .badge-no .badge-label { color: #f87171; }
  .badge-no .badge-conf { color: #fca5a5; }
  .badge-unk { background: #3d3010; border: 1px solid #7a6020; }
  .badge-unk .badge-label { color: #fbbf24; }
  .badge-unk .badge-conf { color: #fcd34d; }
  .shops-label { font-size: 11px; color: #7a5a3a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .shops { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .shop-pill { background: #2d1a08; border: 1px solid #5c3a20; border-radius: 16px; padding: 4px 11px; font-size: 13px; color: #e0c8a0; }
  .summary { font-size: 14px; color: #c4a882; line-height: 1.6; border-top: 1px solid #2d1a08; padding-top: 12px; margin-bottom: 10px; }
  .visit-tip { background: #0f1a10; border: 1px solid #2d5a30; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #86efac; margin-bottom: 14px; }
  .notes-section { border-top: 1px solid #2d1a08; padding-top: 14px; margin-top: 4px; }
  .notes-label { font-size: 11px; color: #7a5a3a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  textarea { width: 100%; background: #0f0a07; border: 1px solid #3d2010; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #f0e6d3; font-family: Georgia, serif; outline: none; resize: vertical; min-height: 80px; margin-bottom: 10px; }
  textarea::placeholder { color: #3d2010; }
  button.mail-btn { width: 100%; background: #7B1E3A; border: none; border-radius: 10px; padding: 12px; color: #f0e6d3; font-size: 15px; font-family: Georgia, serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  button.mail-btn:disabled { background: #3d1a0a; cursor: default; }
  button.mail-btn.sent { background: #1a4731; }
  #empty { text-align: center; padding: 48px 0; }
  #empty .grape { font-size: 44px; margin-bottom: 12px; }
  #empty p { font-size: 14px; color: #7a5a3a; line-height: 1.8; }
  #history { display: none; margin-top: 8px; }
  .history-label { font-size: 11px; color: #7a5a3a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .history-item { background: #1a1008; border: 1px solid #2d1a08; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .history-item span { color: #e0c8a0; font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="icon">🍷</div>
  <div>
    <div class="title">wijntripje.nl</div>
    <div class="sub">NL Wijn Checker · ProWein 2026</div>
  </div>
</header>
<main>
  <div class="label">Typ een wijnhuis</div>
  <div class="search-row">
    <input type="text" id="queryInput" placeholder="bijv. Allegrini, Pol Roger, Dr. Loosen..." autocomplete="off" />
    <button id="searchBtn">🔍</button>
  </div>
  <div id="loading">
    <div class="spin">🔎</div>
    <div style="font-size:14px">Zoeken op internet...</div>
    <div style="font-size:12px;color:#7a5a3a;margin-top:4px">Controleer NL beschikbaarheid</div>
  </div>
  <div id="result"></div>
  <div id="history">
    <div class="history-label">Eerder opgezocht</div>
    <div id="historyList"></div>
  </div>
  <div id="empty">
    <div class="grape">🍇</div>
    <p>Typ een wijnhuis en druk Enter.<br>De tool zoekt live of hun wijnen<br>in Nederland te koop zijn.</p>
  </div>
</main>
<script>
const SYSTEM_PROMPT = `Je bent een wijnexpert die controleert of wijnen van een wijnhuis in Nederland te koop zijn.
De gebruiker typt een wijnhuisnaam. Jij zoekt dit op en antwoordt ALLEEN in dit JSON formaat (geen markdown, geen uitleg eromheen):
{
  "winery": "Officiële naam",
  "country": "Land",
  "region": "Regio",
  "nl_available": true of false of null,
  "confidence": "hoog of middel of laag",
  "where_to_buy": ["winkel of webshop"],
  "summary": "Max 2 zinnen in het Nederlands",
  "visit_tip": "Is dit estate bezoekbaar met proeverijen? Max 1 zin."
}`;

let history = [];
let currentResult = null;
const input = document.getElementById('queryInput');
const btn = document.getElementById('searchBtn');
const loadingEl = document.getElementById('loading');
const resultEl = document.getElementById('result');
const emptyEl = document.getElementById('empty');
const historyEl = document.getElementById('history');
const historyList = document.getElementById('historyList');

input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
btn.addEventListener('click', check);

async function check() {
  const query = input.value.trim();
  if (!query) return;
  btn.disabled = true;
  btn.textContent = '⏳';
  loadingEl.style.display = 'block';
  resultEl.style.display = 'none';
  emptyEl.style.display = 'none';
  currentResult = null;
  try {
    const res = await fetch('/api/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `Wijnhuis: "${query}" — te koop in Nederland?` }]
      })
    });
    const data = await res.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    let parsed;
    try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
    catch { parsed = { winery: query, summary: text, nl_available: null, confidence: 'laag', where_to_buy: [] }; }
    currentResult = parsed;
    showResult(parsed, query);
    addHistory(query, parsed);
  } catch (err) {
    showResult({ error: true, summary: 'Verbindingsfout. Probeer opnieuw.' }, query);
  }
  btn.disabled = false;
  btn.textContent = '🔍';
  loadingEl.style.display = 'none';
}

function showResult(r, query) {
  if (r.error) {
    resultEl.innerHTML = `<div style="color:#f87171;text-align:center;padding:16px">${r.summary}</div>`;
    resultEl.style.display = 'block';
    return;
  }
  const badgeClass = r.nl_available === true ? 'badge-yes' : r.nl_available === false ? 'badge-no' : 'badge-unk';
  const badgeIcon  = r.nl_available === true ? '✅' : r.nl_available === false ? '❌' : '❓';
  const badgeLabel = r.nl_available === true ? 'Beschikbaar in NL' : r.nl_available === false ? 'Niet gevonden in NL' : 'Onbekend';
  const shops = (r.where_to_buy || []).map(s => `<span class="shop-pill">${s}</span>`).join('');
  const shopsHtml = shops ? `<div class="shops-label">Te koop bij</div><div class="shops">${shops}</div>` : '';
  const summaryHtml = r.summary ? `<div class="summary">${r.summary}</div>` : '';
  const tipHtml = r.visit_tip ? `<div class="visit-tip">🏡 ${r.visit_tip}</div>` : '';
  const subLine = [r.region, r.country].filter(Boolean).join(' · ');
  resultEl.innerHTML = `
    <div class="winery-name">${r.winery || query}</div>
    ${subLine ? `<div class="winery-sub">${subLine}</div>` : ''}
    <div class="badge ${badgeClass}">
      <div class="badge-icon">${badgeIcon}</div>
      <div>
        <div class="badge-label">${badgeLabel}</div>
        ${r.confidence ? `<div class="badge-conf">Zekerheid: ${r.confidence}</div>` : ''}
      </div>
    </div>
    ${shopsHtml}${summaryHtml}${tipHtml}
    <div class="notes-section">
      <div class="notes-label">📝 Notities gesprek</div>
      <textarea id="notesField" placeholder="Contact naam, interesse, afspraken, vervolgstap..."></textarea>
      <button class="mail-btn" id="mailBtn" onclick="sendMail()">
        <span>✉️</span> Verstuur naar wijntripje.nl
      </button>
    </div>
  `;
  resultEl.style.display = 'block';
}

async function sendMail() {
  if (!currentResult) return;
  const notes = document.getElementById('notesField').value;
  const mailBtn = document.getElementById('mailBtn');
  mailBtn.disabled = true;
  mailBtn.innerHTML = '<span>⏳</span> Versturen...';
  try {
    const res = await fetch('/api/mail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...currentResult, notes })
    });
    const data = await res.json();
    if (data.ok) {
      mailBtn.innerHTML = '<span>✅</span> Verstuurd naar wijntripje.nl!';
      mailBtn.classList.add('sent');
    } else {
      mailBtn.disabled = false;
      mailBtn.innerHTML = '<span>❌</span> Fout — probeer opnieuw';
    }
  } catch {
    mailBtn.disabled = false;
    mailBtn.innerHTML = '<span>❌</span> Fout — probeer opnieuw';
  }
}

function addHistory(query, result) {
  history = [{ query, result }, ...history.filter(h => h.query !== query).slice(0, 6)];
  renderHistory();
}

function renderHistory() {
  if (history.length <= 1) return;
  historyList.innerHTML = history.slice(1).map((h, i) => {
    const icon = h.result?.nl_available === true ? '✅' : h.result?.nl_available === false ? '❌' : '❓';
    return `<div class="history-item" onclick="loadHistory(${i+1})">
      <span>${h.result?.winery || h.query}</span>
      <span>${icon}</span>
    </div>`;
  }).join('');
  historyEl.style.display = 'block';
}

function loadHistory(i) {
  input.value = history[i].query;
  currentResult = history[i].result;
  showResult(history[i].result, history[i].query);
}
</script>
</body>
</html>
